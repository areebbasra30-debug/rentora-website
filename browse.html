<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Browse Vehicles - Rentora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1 class="logo">Rentora</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="browse.html">Browse</a>
        <a href="post.html">Post Vehicle</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<script>
let vehicles = JSON.parse(localStorage.getItem('vehicles') || "[]");
let container = document.querySelector('.browse-vehicles');

vehicles.forEach(v => {
    let card = document.createElement('div');
    card.className = 'vehicle-card';
    card.innerHTML = `
        <img src="${v.imgURL}" alt="${v.model}">
        <h3>${v.model}</h3>
        <p>Rent: PKR ${v.rent}/day</p>
        <p>Owner: ${v.phone}</p>
    `;
    container.appendChild(card);
});
</script>

</body>
</html>
