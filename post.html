<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post Vehicle - Rentora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1 class="logo">Rentora</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="browse.html">Browse</a>
        <a href="post.html">Post Vehicle</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="post-vehicle">
    <h2 style="text-align:center; margin:20px 0;">Post Your Vehicle</h2>

    <form id="vehicleForm" style="max-width:500px; margin:auto;">
        <input type="text" placeholder="Your Name" required><br><br>
        <input type="text" placeholder="Phone / WhatsApp" required><br><br>
        <input type="email" placeholder="Email" required><br><br>
        <input type="text" placeholder="Vehicle Make & Model" required><br><br>
        <input type="text" placeholder="Variant / Year" required><br><br>
        <input type="text" placeholder="Mileage" required><br><br>
        <input type="text" placeholder="Fuel Average / Features" required><br><br>
        <textarea placeholder="Any Problems / Notes" rows="3"></textarea><br><br>
        <input type="number" placeholder="Rent per day (PKR)" required><br><br>
        <input type="file" accept="image/*"><br><br>
        <button type="submit" class="button">Submit Vehicle</button>
    </form>
</section>

<footer>
    <p>© 2026 Rentora. All rights reserved.</p>
</footer>

</body>
</html>
