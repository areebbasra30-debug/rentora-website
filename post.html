<input type="text" placeholder="Your Name" id="ownerName" required>
<input type="text" placeholder="Phone / WhatsApp" id="ownerPhone" required>
<input type="email" placeholder="Email" id="ownerEmail" required>
<input type="text" placeholder="Vehicle Make & Model" id="vehicleModel" required>
<input type="text" placeholder="Variant / Year" id="vehicleVariant" required>
<input type="text" placeholder="Mileage" id="vehicleMileage" required>
<input type="text" placeholder="Fuel Average / Features" id="vehicleFeatures" required>
<textarea placeholder="Any Problems / Notes" rows="3" id="vehicleNotes"></textarea>
<input type="number" placeholder="Rent per day (PKR)" id="vehicleRent" required>
<input type="file" accept="image/*" id="vehicleImage">
